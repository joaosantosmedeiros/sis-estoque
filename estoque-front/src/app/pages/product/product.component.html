<div class="main">
  <div class="input">
    <form [formGroup]="form">
      <mat-form-field>
        <mat-label>Produto</mat-label>
        <input matInput [formControlName]="'name'" />
      </mat-form-field>
      <mat-form-field>
        <mat-label>Categoria</mat-label>
        <mat-select formControlName="category">
          <mat-option value=""> - </mat-option>
          @for (category of categories; track category.id) {
            <mat-option [value]="category.id">{{category.name}}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </form>
    <div class="filter">
      <button (click)="clearSearch()" mat-mini-fab>
        <mat-icon>filter_alt_off</mat-icon>
      </button>
      <button (click)="search()" mat-mini-fab>
        <mat-icon>search</mat-icon>
      </button>
      <button (click)="insertDialog()" mat-mini-fab>
        <mat-icon>add</mat-icon>
      </button>
    </div>
  </div>

  <div class="main-products">
    <table mat-table [dataSource]="filteredProducts">

      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef> No. </th>
        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element"> <strong>{{element.name}}</strong> </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> </th>
        <td class="" mat-cell *matCellDef="let element">
          <div class="actions">
            <button mat-mini-fab (click)="viewDialog(element)">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-mini-fab (click)="editDialog(element)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-mini-fab (click)="deleteDialog(element.id!)">
              <mat-icon >delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
